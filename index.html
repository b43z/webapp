<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Federación CORVUS</title>
  <style>
    body {
      background: #000;
      color: #fff;
      margin: 0;
      font-family: "Georgia", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      font-size: clamp(1.5em, 5vw, 3em);
      color: #c00;
      padding: 15px;
      text-align: center;
      text-shadow: 0 0 6px #900;
    }
    .imagen {
      width: 100%;
      max-width: 800px;
      margin: 10px auto;
      border: 3px solid #c00;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .imagen img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      display: block;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 20px auto;
      width: 90%;
      max-width: 600px;
      font-size: clamp(1em, 3vw, 1.3em);
    }
    ul li {
      margin: 8px 0;
      padding: 6px;
      background: rgba(30,30,30,0.8);
      border-left: 3px solid #c00;
      border-radius: 4px;
      display: flex;
      align-items: center;
    }
    ul li::before {
      content: "🪶";
      margin-right: 8px;
      color: #c00;
      font-size: 1.2em;
    }
    footer {
      margin-top: 3em; /* separación de tres líneas aprox */
      padding: 15px;
      font-style: italic;
      font-size: clamp(0.9em, 2.5vw, 1.2em);
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>Federación CORVUS</header>
  
  <div class="imagen">
    <img src="corvus.png" alt="Raven CORVUS">
  </div>
  
  <ul>
    <li>Sin Pedofilia</li>
    <li>Sin Racismo</li>
    <li>Sin Bullying</li>
    <li>Sin Pornografía Ilícita</li>
  </ul>

  <footer>
    EL ojo que vigila en la penumbra localizando amenazas y tomando acciones para salvaguardar
  </footer>
</body>
</html>
